<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-eval'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data: blob: file:; media-src 'self' blob: file:; font-src 'self' data: https://fonts.gstatic.com; connect-src 'self' https://api.github.com https://api.opensubtitles.com;" />
    <title>FLUX</title>
    <script>
      // Prevent Vite HMR from updating document.title with module filenames.
      // In dev mode, Vite temporarily sets document.title to loading module paths.
      // Since FLUX uses a custom titlebar (not the OS titlebar), we lock the title.
      Object.defineProperty(document, 'title', {
        get() { return 'FLUX' },
        set() { /* no-op: prevent Vite HMR from overwriting the title */ },
        configurable: true,
      })
    </script>
  </head>
  <body class="bg-black text-white overflow-hidden">
    <div id="root"></div>
    <script type="module" src="./src/main.tsx"></script>
  </body>
</html>
