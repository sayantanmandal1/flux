<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="FLUX Media Player Logo">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7C3AED"/>
      <stop offset="50%" stop-color="#6366F1"/>
      <stop offset="100%" stop-color="#4F46E5"/>
    </linearGradient>
    <linearGradient id="shine" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.18)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </linearGradient>
    <linearGradient id="arrow-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.9)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0.4)"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="16" flood-color="rgba(79,70,229,0.5)"/>
    </filter>
    <filter id="inner-glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <clipPath id="round-clip">
      <rect width="512" height="512" rx="108" ry="108"/>
    </clipPath>
  </defs>

  <!-- Background rounded square -->
  <rect width="512" height="512" rx="108" ry="108" fill="url(#bg)" filter="url(#shadow)"/>

  <!-- Top-half shine overlay -->
  <rect width="512" height="260" rx="108" ry="108" fill="url(#shine)" clip-path="url(#round-clip)"/>

  <!-- Subtle grid pattern for depth -->
  <g opacity="0.06" clip-path="url(#round-clip)">
    <line x1="0" y1="128" x2="512" y2="128" stroke="white" stroke-width="1"/>
    <line x1="0" y1="256" x2="512" y2="256" stroke="white" stroke-width="1"/>
    <line x1="0" y1="384" x2="512" y2="384" stroke="white" stroke-width="1"/>
    <line x1="128" y1="0" x2="128" y2="512" stroke="white" stroke-width="1"/>
    <line x1="256" y1="0" x2="256" y2="512" stroke="white" stroke-width="1"/>
    <line x1="384" y1="0" x2="384" y2="512" stroke="white" stroke-width="1"/>
  </g>

  <!-- Main "F" letterform — vertical stroke -->
  <rect x="100" y="90" width="88" height="332" rx="16" ry="16" fill="white"/>

  <!-- Top horizontal bar of F -->
  <rect x="100" y="90" width="260" height="84" rx="16" ry="16" fill="white"/>

  <!-- Middle horizontal bar of F -->
  <rect x="100" y="213" width="208" height="72" rx="16" ry="16" fill="white"/>

  <!-- Forward-motion arrow tip on top bar (speed/flux accent) -->
  <polygon points="360,90 420,132 360,174" fill="url(#arrow-grad)" filter="url(#inner-glow)"/>

  <!-- Forward-motion arrow tip on middle bar -->
  <polygon points="308,213 368,249 308,285" fill="url(#arrow-grad)" filter="url(#inner-glow)" opacity="0.75"/>

  <!-- Play triangle accent bottom-right (media player identity) -->
  <polygon points="340,348 420,392 340,436" fill="white" opacity="0.30"/>
  <polygon points="350,356 414,392 350,428" fill="white" opacity="0.55"/>

  <!-- Subtle bottom wave line suggesting audio waveform -->
  <path d="M84,460 Q140,440 180,460 Q220,480 260,460 Q300,440 340,460 Q380,480 428,460" 
        stroke="rgba(255,255,255,0.35)" stroke-width="5" fill="none" stroke-linecap="round"/>
</svg>
