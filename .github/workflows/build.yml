name: Build and Release FLUX

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Setup Python (for node-gyp / better-sqlite3)
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'   # 3.11 still has distutils; 3.12+ removed it

      - name: Install Python setuptools (node-gyp dependency)
        run: pip install setuptools

      - name: Upgrade better-sqlite3 to support Electron 32 V8 (requires C++20)
        run: npm install better-sqlite3@latest --ignore-scripts
        env:
          GYP_MSVS_VERSION: '2022'

      - name: Install dependencies
        run: npm ci --ignore-scripts
        env:
          GYP_MSVS_VERSION: '2022'

      - name: Rebuild native modules for Electron
        run: npx @electron/rebuild -w better-sqlite3 --force
        env:
          GYP_MSVS_VERSION: '2022'
        continue-on-error: true

      - name: Download binary resources (mpv, ffmpeg, yt-dlp)
        run: node scripts/download-resources.cjs

      - name: Generate proper 256x256 ICO from PNG (electron-builder requires 256x256 minimum)
        shell: pwsh
        run: |
          Add-Type -AssemblyName System.Drawing
          $png = "$PWD\resources\icons\icon.png"
          $ico = "$PWD\build\icon.ico"
          $bmp = [System.Drawing.Bitmap]::new($png)
          $bmp256 = [System.Drawing.Bitmap]::new($bmp, 256, 256)
          $ms = [System.IO.MemoryStream]::new()
          $bmp256.Save($ms, [System.Drawing.Imaging.ImageFormat]::Png)
          $data = $ms.ToArray()
          $header = [byte[]](0x00,0x00,0x01,0x00,0x01,0x00,0x00,0x00,0x00,0x00,0x01,0x00,0x20,0x00)
          $sizeBytes = [BitConverter]::GetBytes([uint32]$data.Length)
          $offsetBytes = [BitConverter]::GetBytes([uint32](6 + 16))
          $dirEntry = [byte[]](0,0,0,0,0x01,0x00,0x20,0x00) + $sizeBytes + $offsetBytes
          [System.IO.File]::WriteAllBytes($ico, (([byte[]](0x00,0x00,0x01,0x00,0x01,0x00)) + $dirEntry + $data))
          Write-Host "ICO generated: $([math]::Round((Get-Item $ico).Length/1KB,1)) KB"

      - name: Build Electron app
        run: npm run build:win
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_ENV: production

      - name: Upload Release Asset
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/FLUX-Setup-*.exe
            dist/latest.yml
          draft: false
          prerelease: false
          generate_release_notes: true
          name: FLUX ${{ github.ref_name }}
          body: |
            ## FLUX ${{ github.ref_name }}
            
            ### Installation
            Download and run `FLUX-Setup-${{ github.ref_name }}.exe`
            
            ### What's New
            See full changelog below.
            
            ### System Requirements
            - Windows 10 / 11 (x64)
            - 4GB RAM recommended
            - DirectX 11 compatible GPU
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
