name: Build and Release FLUX

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write   # required to create GitHub Releases and upload assets
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Setup Python (for node-gyp / better-sqlite3)
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'   # 3.11 still has distutils; 3.12+ removed it

      - name: Install Python setuptools (node-gyp dependency)
        run: pip install setuptools

      - name: Upgrade better-sqlite3 to support Electron 32 V8 (requires C++20)
        run: npm install better-sqlite3@latest --ignore-scripts
        env:
          GYP_MSVS_VERSION: '2022'

      - name: Install dependencies
        run: npm ci --ignore-scripts
        env:
          GYP_MSVS_VERSION: '2022'

      - name: Rebuild native modules for Electron
        run: npx @electron/rebuild -w better-sqlite3 --force
        env:
          GYP_MSVS_VERSION: '2022'
        continue-on-error: true

      - name: Sync package.json version to match git tag
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}".TrimStart('v')
          $pkg = Get-Content package.json -Raw | ConvertFrom-Json
          $pkg.version = $tag
          $pkg | ConvertTo-Json -Depth 100 | Set-Content package.json
          Write-Host "Version set to $tag"

      - name: Download binary resources (mpv, ffmpeg, yt-dlp)
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $ProgressPreference = 'SilentlyContinue'
          New-Item -Force -ItemType Directory resources\mpv, resources\ffmpeg, "resources\yt-dlp", resources\icons | Out-Null

          # ── yt-dlp ──────────────────────────────────────────────────────────
          if (-not (Test-Path "resources\yt-dlp\yt-dlp.exe")) {
            Write-Host "Downloading yt-dlp..."
            Invoke-WebRequest "https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp.exe" -OutFile "resources\yt-dlp\yt-dlp.exe"
            Write-Host "✓ yt-dlp: $([math]::Round((Get-Item 'resources\yt-dlp\yt-dlp.exe').Length/1MB,1)) MB"
          }

          # ── ffmpeg (BtbN builds) ─────────────────────────────────────────────
          if (-not (Test-Path "resources\ffmpeg\ffmpeg.exe")) {
            Write-Host "Downloading ffmpeg..."
            $headers = @{ Authorization = "Bearer $env:GH_TOKEN" }
            $rel = Invoke-RestMethod "https://api.github.com/repos/BtbN/FFmpeg-Builds/releases/latest" -Headers $headers
            Write-Host "Available assets: $($rel.assets.name -join ', ')"
            # Try several name patterns in order of preference
            $asset = $rel.assets | Where-Object { $_.name -match 'win64-gpl\.zip$' -and $_.name -notmatch 'shared' } | Select-Object -First 1
            if (-not $asset) {
              $asset = $rel.assets | Where-Object { $_.name -match 'win64.*gpl.*\.zip$' } | Select-Object -First 1
            }
            if (-not $asset) {
              $asset = $rel.assets | Where-Object { $_.name -match '\.zip$' -and $_.name -match 'win64' } | Select-Object -First 1
            }
            if (-not $asset) { Write-Host "ERROR: No ffmpeg asset found"; exit 1 }
            Write-Host "Downloading: $($asset.name)"
            Invoke-WebRequest $asset.browser_download_url -OutFile "resources\ffmpeg\ffmpeg.zip" -Headers $headers
            Expand-Archive "resources\ffmpeg\ffmpeg.zip" "resources\ffmpeg" -Force
            $bin = Get-ChildItem "resources\ffmpeg" -Recurse -Filter "ffmpeg.exe" | Select-Object -First 1
            Move-Item $bin.FullName "resources\ffmpeg\ffmpeg.exe" -Force
            $probe = Get-ChildItem "resources\ffmpeg" -Recurse -Filter "ffprobe.exe" | Select-Object -First 1
            Move-Item $probe.FullName "resources\ffmpeg\ffprobe.exe" -Force
            Get-ChildItem "resources\ffmpeg" -Directory | Remove-Item -Recurse -Force
            Remove-Item "resources\ffmpeg\ffmpeg.zip" -Force
            Write-Host "✓ ffmpeg: $([math]::Round((Get-Item 'resources\ffmpeg\ffmpeg.exe').Length/1MB,1)) MB"
          }

          # ── mpv (mpv-winbuild-cmake) ──────────────────────────────────────────
          if (-not (Test-Path "resources\mpv\mpv.exe")) {
            Write-Host "Downloading mpv..."
            $headers = @{ Authorization = "Bearer $env:GH_TOKEN" }
            # Try zhongfly first, fallback to shinchiro
            $mpvUrl = $null
            try {
              $rel = Invoke-RestMethod "https://api.github.com/repos/zhongfly/mpv-winbuild/releases/latest" -Headers $headers
              Write-Host "zhongfly assets: $($rel.assets.name -join ', ')"
              $asset = $rel.assets | Where-Object { $_.name -match 'mpv-x86_64.*\.7z$' -and $_.name -notmatch 'debug' } | Select-Object -First 1
              if (-not $asset) { $asset = $rel.assets | Where-Object { $_.name -match 'x86_64.*\.7z$' } | Select-Object -First 1 }
              if ($asset) { $mpvUrl = $asset.browser_download_url }
            } catch { Write-Host "zhongfly lookup failed: $_" }
            if (-not $mpvUrl) {
              # Fallback: shinchiro/mpv-winbuild-cmake
              $rel2 = Invoke-RestMethod "https://api.github.com/repos/shinchiro/mpv-winbuild-cmake/releases/latest" -Headers $headers
              Write-Host "shinchiro assets: $($rel2.assets.name -join ', ')"
              $asset2 = $rel2.assets | Where-Object { $_.name -match 'mpv-x86_64.*\.7z$' -and $_.name -notmatch 'debug' } | Select-Object -First 1
              if ($asset2) { $mpvUrl = $asset2.browser_download_url }
            }
            if (-not $mpvUrl) { Write-Host "ERROR: No mpv asset found"; exit 1 }
            Write-Host "Downloading mpv from: $mpvUrl"
            Invoke-WebRequest $mpvUrl -OutFile "resources\mpv\mpv.7z" -Headers $headers
            # Use 7zip from GitHub Actions tool cache
            $sevenZip = (Get-Command 7z.exe -ErrorAction SilentlyContinue)?.Source
            if (-not $sevenZip) {
              # Download portable 7za
              Invoke-WebRequest "https://github.com/nicowillis/7z-portable/releases/download/1.0/7za.exe" -OutFile "resources\mpv\7za.exe"
              $sevenZip = "resources\mpv\7za.exe"
            }
            & $sevenZip e "resources\mpv\mpv.7z" mpv.exe -o"resources\mpv" -y | Out-Null
            Remove-Item "resources\mpv\mpv.7z","resources\mpv\7za.exe" -ErrorAction SilentlyContinue
            Write-Host "✓ mpv: $([math]::Round((Get-Item 'resources\mpv\mpv.exe').Length/1MB,1)) MB"
          }

      - name: Verify binaries downloaded (fail fast if missing)
        shell: pwsh
        run: |
          $required = @(
            "resources\mpv\mpv.exe",
            "resources\ffmpeg\ffmpeg.exe",
            "resources\ffmpeg\ffprobe.exe",
            "resources\yt-dlp\yt-dlp.exe"
          )
          $failed = $false
          foreach ($f in $required) {
            if (Test-Path $f) {
              $mb = [math]::Round((Get-Item $f).Length/1MB, 1)
              Write-Host "✓ $f ($mb MB)"
            } else {
              Write-Host "✗ MISSING: $f"
              $failed = $true
            }
          }
          if ($failed) { exit 1 }

      - name: Generate proper 256x256 ICO from PNG (electron-builder requires 256x256 minimum)
        shell: pwsh
        run: |
          Add-Type -AssemblyName System.Drawing
          $png = "$PWD\resources\icons\icon.png"
          $ico = "$PWD\build\icon.ico"
          $bmp = [System.Drawing.Bitmap]::new($png)
          $bmp256 = [System.Drawing.Bitmap]::new($bmp, 256, 256)
          $ms = [System.IO.MemoryStream]::new()
          $bmp256.Save($ms, [System.Drawing.Imaging.ImageFormat]::Png)
          $data = $ms.ToArray()
          $header = [byte[]](0x00,0x00,0x01,0x00,0x01,0x00,0x00,0x00,0x00,0x00,0x01,0x00,0x20,0x00)
          $sizeBytes = [BitConverter]::GetBytes([uint32]$data.Length)
          $offsetBytes = [BitConverter]::GetBytes([uint32](6 + 16))
          $dirEntry = [byte[]](0,0,0,0,0x01,0x00,0x20,0x00) + $sizeBytes + $offsetBytes
          [System.IO.File]::WriteAllBytes($ico, (([byte[]](0x00,0x00,0x01,0x00,0x01,0x00)) + $dirEntry + $data))
          Write-Host "ICO generated: $([math]::Round((Get-Item $ico).Length/1KB,1)) KB"

      - name: Copy config to .js so electron-builder loads it without ts-node
        shell: pwsh
        run: |
          # electron-builder loads .js with require() directly (no transpiler needed).
          # .ts requires jiti/ts-node which is not installed in CI.
          Copy-Item electron-builder.config.ts electron-builder.config.js -Force
          Write-Host "electron-builder.config.js created"

      - name: Build Electron app
        run: npm run build:win
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_ENV: production

      - name: Verify binaries included in package (fail if mpv missing)
        shell: pwsh
        run: |
          # extraResources copies to process.resourcesPath directly (not in a subfolder)
          # So the path in win-unpacked is: dist\win-unpacked\resources\mpv\mpv.exe
          $unpacked = "dist\win-unpacked\resources"
          $checks = @("mpv\mpv.exe","ffmpeg\ffmpeg.exe","ffmpeg\ffprobe.exe","yt-dlp\yt-dlp.exe")
          $failed = $false
          foreach ($f in $checks) {
            $full = Join-Path $unpacked $f
            if (Test-Path $full) {
              $mb = [math]::Round((Get-Item $full).Length/1MB,1)
              Write-Host "✓ Packaged: $f ($mb MB)"
            } else {
              Write-Host "✗ NOT PACKAGED: $full"
              $failed = $true
            }
          }
          if ($failed) { Write-Host "ERROR: Binaries missing from package!"; exit 1 }

      - name: Copy installer as FLUX-Setup-latest.exe (permanent download URL)
        shell: pwsh
        run: |
          Write-Host "Contents of dist/:"
          Get-ChildItem dist | Select-Object Name | Format-Table -HideTableHeaders
          # Find whatever .exe electron-builder actually produced
          $exe = Get-ChildItem dist -Filter "*.exe" | Where-Object { $_.Name -notlike "*latest*" -and $_.Name -notlike "*uninstaller*" -and $_.Name -notlike "*elevate*" } | Select-Object -First 1
          if ($exe) {
            Copy-Item $exe.FullName "dist\FLUX-Setup-latest.exe"
            Write-Host "Copied $($exe.Name) -> dist\FLUX-Setup-latest.exe"
          } else {
            Write-Host "WARNING: No installer exe found in dist/"
            exit 1
          }

      - name: Upload Release Asset
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/FLUX-Setup-*.exe
            dist/*.blockmap
            dist/latest.yml
          draft: false
          prerelease: false
          generate_release_notes: true
          name: FLUX ${{ github.ref_name }}
          body: |
            ## FLUX ${{ github.ref_name }}
            
            ### Installation
            Download and run `FLUX-Setup-${{ github.ref_name }}.exe` (note: filename has no 'v' prefix, e.g. FLUX-Setup-1.0.8.exe)
            
            ### What's New
            See full changelog below.
            
            ### System Requirements
            - Windows 10 / 11 (x64)
            - 4GB RAM recommended
            - DirectX 11 compatible GPU
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}