name: Build and Release FLUX

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Setup Python (for node-gyp / better-sqlite3)
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'   # 3.11 still has distutils; 3.12+ removed it

      - name: Install Python setuptools (node-gyp dependency)
        run: pip install setuptools

      - name: Install dependencies
        run: npm ci
        env:
          GYP_MSVS_VERSION: '2022'

      - name: Download binary resources (mpv, ffmpeg, yt-dlp)
        run: node scripts/download-resources.cjs

      - name: Build Electron app
        run: npm run build:win
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_ENV: production

      - name: Upload Release Asset
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/FLUX-Setup-*.exe
            dist/latest.yml
          draft: false
          prerelease: false
          generate_release_notes: true
          name: FLUX ${{ github.ref_name }}
          body: |
            ## FLUX ${{ github.ref_name }}
            
            ### Installation
            Download and run `FLUX-Setup-${{ github.ref_name }}.exe`
            
            ### What's New
            See full changelog below.
            
            ### System Requirements
            - Windows 10 / 11 (x64)
            - 4GB RAM recommended
            - DirectX 11 compatible GPU
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}