# FLUX Media Player - mpv.conf
# No vo= here - mpv auto-selects best video output when a file loads.
# Specifying vo at startup forces VO init before the IPC pipe is ready,
# which crashes on CPU-only systems.

# Audio
ao=wasapi
audio-exclusive=no
volume-max=200
audio-pitch-correction=yes
audio-normalize-downmix=yes

# Subtitles
sub-auto=fuzzy
sub-font=Arial
sub-font-size=42
sub-color=1.0/1.0/1.0/1.0
sub-border-color=0.0/0.0/0.0/1.0
sub-border-size=2.5
sub-shadow-offset=1
sub-shadow-color=0.0/0.0/0.0/0.5
sub-bold=no
sub-italic=no
sub-ass-override=yes
blend-subtitles=no

# OSD (disabled - React UI handles all display)
osd-level=0
osd-bar=no

# Screenshots
screenshot-format=png
screenshot-template=FLUX-%F-%P

# File loading
keep-open=yes
idle=yes
pause=no
loop=no
loop-playlist=no

# Cache
cache=yes
demuxer-max-bytes=512MiB
demuxer-max-back-bytes=128MiB

# Network / streaming
network-timeout=60
ytdl=yes
ytdl-format=bestvideo[ext=mp4]+bestaudio[ext=m4a]/bestvideo+bestaudio/best

# Window (managed by Electron)
ontop=no
border=no
cursor-autohide=always
osc=no

[protocol.http]
cache=yes
no-cache-pause
demuxer-readahead-secs=20

[protocol.https]
profile=protocol.http

[protocol.rtsp]
rtsp-transport=tcp
