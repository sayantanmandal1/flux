# FLUX mpv input.conf — all keybindings disabled (Electron handles shortcuts)
# mpv processes keybindings when it has OS focus (via --wid embedding)
# We clear all defaults so Electron's keyboard handler is authoritative.

# Clear ALL default keybindings
SPACE ignore
LEFT ignore
RIGHT ignore
UP ignore
DOWN ignore
PGUP ignore
PGDWN ignore
HOME ignore
END ignore
f ignore
F ignore
ESC ignore
q ignore
Q ignore
m ignore
M ignore
. ignore
, ignore
s ignore
S ignore
o ignore
O ignore
p ignore
P ignore
l ignore
L ignore
